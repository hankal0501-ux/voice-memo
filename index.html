<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>음성 메모장</title>
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#007aff" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="phone-frame">


    <!-- 앱 헤더 -->
    <div class="app-header">
      <div class="doc-name" id="docName" contenteditable="true" inputmode="text" spellcheck="false">문서 제목</div>
<span class="autosave-indicator" id="autoSaveIndicator"></span>
      <div class="header-buttons">
        <button class="icon-btn" id="newBtn" title="새로 시작">🆕</button>
        <button class="icon-btn" id="loadBtn" title="불러오기">📂</button>
        <input type="file" id="fileInput" accept=".txt,.zip" style="display:none" />
        <button class="icon-btn" id="saveBtn" title="저장">💾</button>
        <button class="record-btn" id="recordBtn" title="음성입력">🎤</button>
      </div>
    </div>

    <!-- 모드 탭 (1행) -->
    <div class="mode-tabs">
      <div class="mode-tabs-inner">
        <button class="mode-tab active" id="memoModeBtn">메모</button>
        <button class="mode-tab" id="sanChulBtn">산출</button>
      </div>
    </div>

    <!-- 메모 페이지 탭 -->
    <div class="page-tabs" id="pageTabsRow">
      <div class="tabs-scroll" id="memoTabsScroll">
        <button class="tab active" data-page="1">1</button>
        <button class="tab" data-page="2">2</button>
        <button class="tab add-tab" id="addPageBtn">＋</button>
      </div>
      <button class="del-page-icon-btn" id="delPageBtn" title="페이지 삭제">🗑</button>
    </div>

    <!-- 산출 페이지 탭 -->
    <div class="page-tabs" id="sanPageTabsRow" style="display:none">
      <div class="tabs-scroll" id="sanTabsScroll">
        <button class="tab sc-tab active" data-sc-page="1">1</button>
        <button class="tab add-tab" id="addSanPageBtn">＋</button>
      </div>
      <button class="del-page-icon-btn" id="delSanPageBtn" title="산출 페이지 삭제">🗑</button>
    </div>

    <!-- 산출 툴바 (산출 모드에서만 표시) -->
    <div class="sanchul-toolbar" id="sanChulToolbar" style="display:none">
      <div style="flex:1"></div>
      <button class="sanchul-col-btn" id="scAddRow">행추가</button>
      <button class="sanchul-col-btn" id="scAddCol">열추가</button>
    </div>

    <!-- 메모 영역 -->
    <div class="memo-area">
      <div class="table-wrapper">
        <table class="memo-table" id="memoTable">
          <thead>
            <tr>
              <th class="col-floor">층</th>
              <th class="col-loc">위치</th>
              <th class="col-content">점검내용</th>
              <th class="col-result">점검결과</th>
            </tr>
          </thead>
          <tbody id="tableBody">
            <tr>
              <td contenteditable="true" inputmode="text" autocorrect="on" autocapitalize="sentences" spellcheck="true"></td>
              <td contenteditable="true" inputmode="text" autocorrect="on" autocapitalize="sentences" spellcheck="true"></td>
              <td contenteditable="true" inputmode="text" autocorrect="on" autocapitalize="sentences" spellcheck="true"></td>
              <td contenteditable="true" inputmode="text" autocorrect="on" autocapitalize="sentences" spellcheck="true"></td>
            </tr>
            <tr>
              <td contenteditable="true" inputmode="text" autocorrect="on" autocapitalize="sentences" spellcheck="true"></td>
              <td contenteditable="true" inputmode="text" autocorrect="on" autocapitalize="sentences" spellcheck="true"></td>
              <td contenteditable="true" inputmode="text" autocorrect="on" autocapitalize="sentences" spellcheck="true"></td>
              <td contenteditable="true" inputmode="text" autocorrect="on" autocapitalize="sentences" spellcheck="true"></td>
            </tr>
            <tr>
              <td contenteditable="true" inputmode="text" autocorrect="on" autocapitalize="sentences" spellcheck="true"></td>
              <td contenteditable="true" inputmode="text" autocorrect="on" autocapitalize="sentences" spellcheck="true"></td>
              <td contenteditable="true" inputmode="text" autocorrect="on" autocapitalize="sentences" spellcheck="true"></td>
              <td contenteditable="true" inputmode="text" autocorrect="on" autocapitalize="sentences" spellcheck="true"></td>
            </tr>
            <tr>
              <td contenteditable="true" inputmode="text" autocorrect="on" autocapitalize="sentences" spellcheck="true"></td>
              <td contenteditable="true" inputmode="text" autocorrect="on" autocapitalize="sentences" spellcheck="true"></td>
              <td contenteditable="true" inputmode="text" autocorrect="on" autocapitalize="sentences" spellcheck="true"></td>
              <td contenteditable="true" inputmode="text" autocorrect="on" autocapitalize="sentences" spellcheck="true"></td>
            </tr>
            <tr>
              <td contenteditable="true" inputmode="text" autocorrect="on" autocapitalize="sentences" spellcheck="true"></td>
              <td contenteditable="true" inputmode="text" autocorrect="on" autocapitalize="sentences" spellcheck="true"></td>
              <td contenteditable="true" inputmode="text" autocorrect="on" autocapitalize="sentences" spellcheck="true"></td>
              <td contenteditable="true" inputmode="text" autocorrect="on" autocapitalize="sentences" spellcheck="true"></td>
            </tr>
          </tbody>
        </table>
      </div>
      <!-- 행 추가 버튼 -->
      <button class="add-row-btn" id="addRowBtn">＋ 행 추가</button>
    </div>

    <!-- 산출 영역 (산출 모드에서만 표시) -->
    <div class="memo-area" id="sanChulArea" style="display:none">
      <div class="sanchul-page-title">산출하기</div>
      <div class="sanchul-table-wrap">
        <table class="sanchul-table" id="sanChulTable">
          <thead>
            <tr id="sanChulHeadRow">
              <th contenteditable="true" inputmode="text" spellcheck="false">층</th>
              <th contenteditable="true" inputmode="text" spellcheck="false">소화기</th>
              <th contenteditable="true" inputmode="text" spellcheck="false">주방자동소화장치</th>
              <th contenteditable="true" inputmode="text" spellcheck="false">점검결과</th>
              <th contenteditable="true" inputmode="text" spellcheck="false">피난기구</th>
            </tr>
          </thead>
          <tbody id="sanChulBody">
            <tr><td contenteditable="true"></td><td contenteditable="true"></td><td contenteditable="true"></td><td contenteditable="true"></td><td contenteditable="true"></td></tr>
            <tr><td contenteditable="true"></td><td contenteditable="true"></td><td contenteditable="true"></td><td contenteditable="true"></td><td contenteditable="true"></td></tr>
            <tr><td contenteditable="true"></td><td contenteditable="true"></td><td contenteditable="true"></td><td contenteditable="true"></td><td contenteditable="true"></td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- 하단 툴바 -->
    <div class="bottom-toolbar">
      <button class="tool-btn" id="photoBtn" title="사진 삽입">📷</button>
      <button class="record-btn" id="recordBtn2" title="음성입력">🎤</button>
      <span style="font-size:9px;color:#c7c7cc;">ver.G5183</span>
      <button class="tool-btn sc-num-btn" id="scPlus" style="display:none">＋</button>
      <button class="tool-btn sc-num-btn" id="scMinus" style="display:none">－</button>
    </div>
    <input type="file" id="photoInput" accept="image/*" capture="environment" style="display:none" />
    <input type="file" id="photoGalleryInput" accept="image/*" style="display:none" />

    <!-- 이미지 전체보기 모달 -->
    <div class="modal-overlay" id="imgModal">
      <div class="img-modal-inner">
        <div id="imgModalName" class="img-modal-name"></div>
        <img id="imgModalSrc" src="" alt="" />
        <button class="img-modal-close" id="imgModalClose">✕</button>
      </div>
    </div>

    <!-- 홈 바 -->
    <div class="home-bar"></div>

    <!-- 사진 선택 모달 -->
    <div class="modal-overlay" id="photoModal">
      <div class="modal-sheet">
        <div class="modal-title">사진 추가</div>
        <button class="modal-btn" id="photoCameraBtn">
          <span class="modal-icon">📷</span> 카메라로 찍기
        </button>
        <button class="modal-btn" id="photoGalleryBtn">
          <span class="modal-icon">🖼</span> 사진첩에서 선택
        </button>
        <button class="modal-cancel" id="photoModalClose">취소</button>
      </div>
    </div>

    <!-- 저장 모달 -->
    <div class="modal-overlay" id="saveModal">
      <div class="modal-sheet">
        <div class="modal-title">저장 방법 선택</div>
        <button class="modal-btn" id="saveKakaoBtn">
          <span class="modal-icon">💬</span> 카카오톡 공유
        </button>
        <button class="modal-btn" id="saveDeviceBtn">
          <span class="modal-icon">📥</span> 기기에 저장
        </button>
        <button class="modal-cancel" id="saveModalClose">취소</button>
      </div>
    </div>
  </div>

  <!-- 파일명 입력 모달 -->
  <div class="modal-overlay" id="filenameModal">
    <div class="modal-sheet">
      <div class="modal-title">파일 이름 입력</div>
      <input class="filename-input" id="filenameInput" type="text" inputmode="text" spellcheck="false" />
      <button class="modal-btn" id="filenameConfirmBtn">
        <span class="modal-icon">💾</span> 저장
      </button>
      <button class="modal-cancel" id="filenameModalClose">취소</button>
    </div>
  </div>

  <!-- 폴더 선택 모달 -->
  <div class="modal-overlay" id="folderModal">
    <div class="modal-sheet">
      <div class="modal-title" id="folderModalTitle">저장 폴더 선택</div>
      <div id="folderBreadcrumb" class="folder-breadcrumb"></div>
      <div id="folderList" class="folder-list"></div>
      <button class="modal-btn" id="folderConfirmBtn" style="display:none">
        <span class="modal-icon">✅</span> 이 폴더에 저장
      </button>
      <button class="modal-cancel" id="folderModalClose">취소</button>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
